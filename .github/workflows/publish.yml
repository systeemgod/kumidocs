name: Publish to npm

on:
    push:
        branches: [main]
    workflow_dispatch:

# Minimal permissions: id-token is the only addition required for OIDC.
permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: npm
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - uses: actions/checkout@v4

            # Node 24 is required; npm 11.5.1+ is needed for OIDC Trusted Publishing.
            # (Node 22 ships with npm 10 which does not support it.)
            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            # Stamp the datebased version into package.json.
            # Format: 0.YYYYMMDD.<run-number>  (e.g. 0.20260313.42)
            - name: Set version
              run: |
                  VERSION="0.$(date -u +%Y%m%d).${{ github.run_number }}"
                  npm version "$VERSION" --no-git-tag-version
                  echo "VERSION=$VERSION" >> "$GITHUB_ENV"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            # OIDC Trusted Publishing: no secrets required.
            # Provenance attestation is generated automatically by npm when
            # publishing via trusted publishing from a public repository.
            - name: Publish
              run: npm publish --access public
